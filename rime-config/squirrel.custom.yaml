# squirrel.custom.yaml
# 鼠须管外观自定义配置

patch:
  # ===== 布局 =====
  style/horizontal: true
  style/inline_preedit: true
  style/candidate_list_layout: linear
  style/candidate_count: 7
  style/font_face: "PingFangSC-Regular"
  style/font_point: 16
  style/label_font_point: 14
  style/corner_radius: 8
  style/border_width: 0
  style/line_spacing: 5
  style/translucency: true

  # ===== 浅色主题 =====
  style/color_scheme: macos_light
  preset_color_schemes/macos_light:
    name: "macOS Light"
    author: "Custom"
    alpha: 0.88
    back_color: 0xFFFFFF
    border_color: 0xE0E0E0
    candidate_text_color: 0x333333
    comment_text_color: 0x999999
    hilited_back_color: 0xD6DBE9
    hilited_candidate_back_color: 0xFF6000
    hilited_candidate_text_color: 0xFFFFFF
    hilited_comment_text_color: 0xCCCCCC
    hilited_text_color: 0x333333
    label_color: 0x999999
    hilited_candidate_label_color: 0xFFFFFF
    text_color: 0x333333

  # ===== 深色主题（自动跟随系统）=====
  style/color_scheme_dark: macos_dark
  preset_color_schemes/macos_dark:
    name: "macOS Dark"
    author: "Custom"
    alpha: 0.88
    back_color: 0x2D2D2D
    border_color: 0x4A4A4A
    candidate_text_color: 0xE8E8E8
    comment_text_color: 0x888888
    hilited_back_color: 0x484848
    hilited_candidate_back_color: 0xFF6000
    hilited_candidate_text_color: 0xFFFFFF
    hilited_comment_text_color: 0xAAAAAA
    hilited_text_color: 0xE8E8E8
    label_color: 0x888888
    hilited_candidate_label_color: 0xFFFFFF
    text_color: 0xE8E8E8

  # ===== 特定 App 默认英文 =====
  app_options:
    com.microsoft.VSCode:
      ascii_mode: true
    com.apple.Terminal:
      ascii_mode: true
    com.googlecode.iterm2:
      ascii_mode: true
    com.apple.dt.Xcode:
      ascii_mode: true
    io.alacritty:
      ascii_mode: true
    com.jetbrains.intellij:
      ascii_mode: true
